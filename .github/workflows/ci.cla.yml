name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: |
      (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
      || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/EpicenterHQ/epicenter/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'bot*,dependabot[bot],renovate[bot],github-actions[bot]'
          custom-notsigned-prcomment: >-
            Thank you for your contribution! Before we can merge this PR, we need you to sign our
            [Contributor License Agreement](https://github.com/EpicenterHQ/epicenter/blob/main/CLA.md).
            This is a one-time requirement—it lets us offer commercial licenses for the sync server
            while you retain full copyright on your code.


            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
